kind = "web"
previewPath = "/"
title = "Startup Review Guy"
version = "1.0.0"
id = "artifacts/startup-review-guy"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25429

[services.development]
run = "pnpm --filter @workspace/startup-review-guy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/startup-review-guy", "run", "build" ]
serve = "static"
publicDir = "artifacts/startup-review-guy/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25429"
BASE_PATH = "/"
